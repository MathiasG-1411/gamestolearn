<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#4f46e5"/>

  <!-- Ear tufts -->
  <polygon points="30,28 24,10 38,20" fill="#c7d2fe"/>
  <polygon points="70,28 76,10 62,20" fill="#c7d2fe"/>

  <!-- Head -->
  <ellipse cx="50" cy="36" rx="22" ry="20" fill="#e0e7ff"/>

  <!-- Eye rings -->
  <circle cx="40" cy="35" r="9.5" fill="white"/>
  <circle cx="60" cy="35" r="9.5" fill="white"/>

  <!-- Pupils -->
  <circle cx="40" cy="35" r="6" fill="#1e1b4b"/>
  <circle cx="60" cy="35" r="6" fill="#1e1b4b"/>

  <!-- Eye shine -->
  <circle cx="42" cy="32.5" r="2" fill="white"/>
  <circle cx="62" cy="32.5" r="2" fill="white"/>

  <!-- Beak -->
  <polygon points="50,41 45,48 55,48" fill="#fbbf24"/>

  <!-- Body -->
  <ellipse cx="50" cy="72" rx="20" ry="20" fill="#c7d2fe"/>

  <!-- Belly -->
  <ellipse cx="50" cy="74" rx="11" ry="14" fill="#e0e7ff"/>

  <!-- Wings -->
  <ellipse cx="27" cy="70" rx="9" ry="16" fill="#a5b4fc" transform="rotate(-8 27 70)"/>
  <ellipse cx="73" cy="70" rx="9" ry="16" fill="#a5b4fc" transform="rotate(8 73 70)"/>

  <!-- Feet -->
  <path d="M40,88 Q36,94 32,95 Q35,95 38,91 Q41,95 44,95 Q41,94 40,88" fill="#fbbf24"/>
  <path d="M60,88 Q64,94 68,95 Q65,95 62,91 Q59,95 56,95 Q59,94 60,88" fill="#fbbf24"/>
</svg>
